<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hi Buni ❤️</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        overflow: hidden;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 80%;
        max-width: 400px;
    }

    h1 {
        color: #ff4f81;
    }

    button {
        padding: 12px 24px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.3s ease, opacity 0.5s ease;
    }

    #whatBtn {
        background: #6c63ff;
        color: white;
    }

    #yesBtn {
        background: #4CAF50;
        color: white;
    }

    #noBtn {
        background: #f44336;
        color: white;
    }

    .heart {
        position: fixed;
        color: pink;
        font-size: 20px;
        pointer-events: none;
        animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(-200px); opacity: 0; }
    }
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="container" id="screen1">
    <h1>Hi Buni &lt;3</h1>
    <p>I've been wanting to ask you something...</p>
    <button id="whatBtn">What? 👀</button>
</div>

<!-- SCREEN 2 -->
<div class="container" id="screen2" style="display:none;">
    <h1>Will you go on a date with me? ❤️</h1>

    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😅</button>

    <h2 id="response"></h2>
</div>

<script>
    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const whatBtn = document.getElementById("whatBtn");

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const response = document.getElementById("response");

    let yesSize = 1;

    // Switch screens
    whatBtn.addEventListener("click", () => {
        screen1.style.display = "none";
        screen2.style.display = "block";
    });

    // YES button final sequence
    yesBtn.addEventListener("click", () => {

        // Fade out buttons
        yesBtn.style.opacity = "0";
        noBtn.style.opacity = "0";

        setTimeout(() => {
            yesBtn.style.display = "none";
            noBtn.style.display = "none";
        }, 500);

        // Message
        const message =
            "I'm glad you said yes! I'M SO EXCITED YAYYYYYYYYYYYY <3";

        response.textContent = "";
        let i = 0;

        // Typewriter effect
        function typeWriter() {
            if (i < message.length) {
                response.textContent += message.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            } else {
                launchConfetti();
            }
        }

        typeWriter();

        // Confetti
        function launchConfetti() {
            for (let j = 0; j < 150; j++) {
                const confetti = document.createElement("div");

                confetti.innerHTML = Math.random() > 0.5 ? "🎉" : "❤️";
                confetti.style.position = "fixed";
                confetti.style.left = Math.random() * window.innerWidth + "px";
                confetti.style.top = Math.random() * window.innerHeight + "px";
                confetti.style.fontSize = "26px";
                confetti.style.zIndex = "9999";
                confetti.style.pointerEvents = "none";

                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3500);
            }
        }
    });

    // NO button runs away + YES grows
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 300 - 150;
        const y = Math.random() * 200 - 100;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;

        yesSize += 0.2;
        yesBtn.style.transform = `scale(${yesSize})`;
    });

    // Floating hearts
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }, 500);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Question ❤️</title>

    <style>
        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ff4f81;
        }

        button {
    padding: 12px 24px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

        #yesBtn {
            background: #4CAF50;
            color: white;
        }

        #noBtn {
            background: #f44336;
            color: white;
            position: relative;
        }
    </style>
</head>
<body>

<div class="container" id="screen1">
    <h1>Hi Buni &lt;3</h1>
    <p>I've been wanting to ask you something...</p>
    <button id="whatBtn">What? 👀</button>
</div>

<div class="container" id="screen2" style="display:none;">
    <h1>Will you go on a date with me? ❤️</h1>

    <button id="yesBtn">Yes ❤️</button>
    <button id="noBtn">No 😅</button>

    <h2 id="response"></h2>
</div>

<script>
    const screen1 = document.getElementById("screen1");
    const screen2 = document.getElementById("screen2");
    const whatBtn = document.getElementById("whatBtn");

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const response = document.getElementById("response");

    let yesSize = 1;

    whatBtn.addEventListener("click", () => {
        screen1.style.display = "none";
        screen2.style.display = "block";
    });

   yesBtn.addEventListener("click", () => {
    response.textContent = "YAY!! ❤️ I can't wait!";

    // Confetti effect
    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");

        confetti.innerHTML = Math.random() > 0.5 ? "🎉" : "❤️";
        confetti.style.position = "fixed";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = Math.random() * window.innerHeight + "px";
        confetti.style.fontSize = "24px";
        confetti.style.zIndex = "9999";
        confetti.style.pointerEvents = "none";

        document.body.appendChild(confetti);

        setTimeout(() => {
            confetti.remove();
        }, 3000);
    }
});
    });

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * 300 - 150;
        const y = Math.random() * 200 - 100;

        noBtn.style.transform = `translate(${x}px, ${y}px)`;

        yesSize += 0.2;
        yesBtn.style.transform = `scale(${yesSize})`;
    });
</script>

</body>
</html>
